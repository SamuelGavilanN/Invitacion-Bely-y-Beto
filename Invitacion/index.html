<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Bely y Beto</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffcc00;
            background-image: 
                repeating-conic-gradient(
                    from 0deg at 50% 50%,
                    #ffcc00 0deg 5deg,
                    #ff9900 5deg 10deg,
                    #ffcc00 10deg 15deg
                );
            background-size: 100% 100%;
            font-family: 'Comic Neue', cursive, sans-serif;
            overflow: hidden;
        }

        /* Contenedor de la invitación */
        .invitation-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            background-image: url('Foto Principal.jpeg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #fff5e6;
            margin: 20px;
            border: 4px solid #ffcc00;
        }

        /* Capa de contenido */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 15px 30px 15px;
            text-align: center;
            z-index: 2;
        }

        /* Título arriba */
        .title-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 30px;
            border-radius: 50px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .title-box:active {
            transform: scale(0.95);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #d32f2f;
            text-shadow: 2px 2px 0px #fff;
        }

        /* Contenido oculto que se muestra al presionar ¡Hijo! */
        .invite-box {
            display: none;
            background: rgba(255, 255, 255, 0.92);
            padding: 20px 25px;
            border-radius: 30px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 300px;
            animation: fadeIn 0.5s ease;
            margin: 10px 0;
        }

        .invite-box.show {
            display: block;
        }

        .invite-text {
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1.3rem;
            line-height: 1.8;
            color: #1a237e;
        }

        .highlight {
            color: #c62828;
            font-weight: 900;
            font-size: 1.5rem;
        }

        /* Información de lugar y fecha (más abajo) */
        .info-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 20px;
            border: 3px solid #ffcc00;
            margin: 10px 0;
            width: 90%;
            max-width: 280px;
            animation: fadeIn 0.5s ease;
        }

        .info-box.show {
            display: block;
        }

        .info-text {
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 2;
            color: #1a237e;
        }

        /* Footer abajo */
        .footer-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 8px 30px;
            border-radius: 50px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .footer-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #c62828;
        }

        /* ANIMACIONES */

        /* Brillo en bordes (sin rotación) */
        .invitation-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 32px;
            background: conic-gradient(
                #ffcc00, 
                #ff6b00, 
                #ff00ff, 
                #ff6b00, 
                #ffcc00
            );
            z-index: -1;
            animation: pulseBorder 2s ease-in-out infinite;
            background-size: 300% 300%;
        }

        @keyframes pulseBorder {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Confeti animado */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            border-radius: 2px;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Estrellas brillantes */
        .star-bright {
            position: absolute;
            font-size: 1.2rem;
            color: #ffd700;
            animation: twinkle 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 400px) {
            h1 { font-size: 2rem; }
            .invite-text { font-size: 1.1rem; }
            .footer-text { font-size: 2rem; }
            .invite-box { padding: 15px 20px; }
            .title-box { padding: 5px 20px; margin-top: 20px; }
            .footer-box { margin-bottom: 20px; }
            .content { padding: 20px 15px 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        
        <!-- Confeti animado -->
        <div class="confetti-container" id="confettiContainer"></div>

        <!-- Estrellas brillantes -->
        <div class="star-bright" style="top: 5%; left: 5%;">✦</div>
        <div class="star-bright" style="top: 10%; right: 5%; animation-delay: 0.5s;">✦</div>
        <div class="star-bright" style="bottom: 15%; left: 5%; animation-delay: 1s;">✦</div>
        <div class="star-bright" style="bottom: 20%; right: 5%; animation-delay: 0.3s;">✦</div>

        <div class="content">
            <!-- Título arriba - Click para mostrar contenido -->
            <div class="title-box" onclick="toggleContent()">
                <h1>¡Hijo!</h1>
            </div>

            <!-- Contenido que se muestra al presionar ¡Hijo! -->
            <div class="invite-box" id="inviteBox">
                <div class="invite-text">
                    Te invito a ver <br>
                    <span class="highlight">Bely y Beto</span><br>
                    junto a mi
                </div>
            </div>

            <!-- Información de lugar y fecha (más abajo) -->
            <div class="info-box" id="infoBox">
                <div class="info-text">
                    29 de junio del 2026<br>
                    16:30 Hrs<br>
                    Teatro Caupolicán
                </div>
            </div>

            <!-- Footer abajo -->
            <div class="footer-box">
                <div class="footer-text">
                    ¡No Faltes!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para mostrar contenido al presionar ¡Hijo!
        function toggleContent() {
            const invite = document.getElementById('inviteBox');
            const info = document.getElementById('infoBox');
            
            invite.classList.toggle('show');
            info.classList.toggle('show');
        }

        // Generar confeti
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffcc00', '#ff6b00', '#ff0000', '#ff00ff', '#00ccff', '#ffa500', '#ff1493', '#00ff7f'];
            
            for (let i = 0; i < 25; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 6 + 4 + 'px';
                confetti.style.height = Math.random() * 6 + 4 + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(confetti);
            }
        }

        // Limpiar confeti viejo y regenerar cada 5 segundos
        function refreshConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            createConfetti();
        }

        // Iniciar confeti
        createConfetti();
        setInterval(refreshConfetti, 5000);
    </script>

</body>
</html>
