<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Bely y Beto</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Fredoka+One&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* FONDO EXTERNO: Rayos amarillos generados con CSS */
            background: #ffcc00;
            background-image: 
                repeating-conic-gradient(
                    from 0deg at 50% 50%,
                    #ffcc00 0deg 5deg,
                    #ff9900 5deg 10deg,
                    #ffcc00 10deg 15deg
                );
            background-size: 100% 100%;
            animation: rotateBg 60s linear infinite;
            font-family: 'Comic Neue', cursive, sans-serif;
            overflow: hidden;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Contenedor de la invitación */
        .invitation-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            /* FONDO INTERNO: Foto Principal (Bely y Beto) */
            background-image: url('Foto Principal.jpeg');
            background-size: contain; /* Muestra la imagen completa */
            background-position: center;
            background-repeat: no-repeat;
            background-color: #fff5e6; /* Color de fondo suave para rellenar espacios */
            margin: 20px;
            border: 4px solid #ffcc00;
        }

        /* Capa de contenido */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            text-align: center;
            z-index: 2;
        }

        /* Estilos del texto */
        .title-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 25px;
            border-radius: 50px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 12px;
            position: relative;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #d32f2f;
            text-shadow: 2px 2px 0px #fff;
        }

        .invite-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 15px 20px;
            border-radius: 30px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            width: 90%;
            max-width: 280px;
        }

        .invite-text {
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #1a237e;
        }

        .highlight {
            color: #c62828;
            font-weight: 900;
            font-size: 1.4rem;
        }

        /* Botón para abrir información */
        .btn-info {
            font-family: 'Fredoka One', cursive;
            background: #ffcc00;
            color: #d32f2f;
            border: 3px solid #fff;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .btn-info:active {
            transform: scale(0.95);
        }

        /* Información oculta (lugar y hora) */
        .info-hidden {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 15px;
            border-radius: 20px;
            border: 3px solid #ffcc00;
            margin-top: 8px;
            width: 90%;
            max-width: 280px;
            animation: fadeIn 0.5s ease;
        }

        .info-hidden.show {
            display: block;
        }

        .info-text {
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.8;
            color: #1a237e;
        }

        /* Footer */
        .footer-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 5px 25px;
            border-radius: 50px;
            border: 3px solid #ffcc00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-top: 8px;
        }

        .footer-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #c62828;
        }

        /* ANIMACIONES */

        /* Brillo en bordes */
        .invitation-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 32px;
            background: conic-gradient(
                #ffcc00, 
                #ff6b00, 
                #ff00ff, 
                #ff6b00, 
                #ffcc00
            );
            z-index: -1;
            animation: spinBorder 3s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes spinBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Confeti animado */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            border-radius: 2px;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Estrellas brillantes */
        .star-bright {
            position: absolute;
            font-size: 1.2rem;
            color: #ffd700;
            animation: twinkle 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
            .invite-text { font-size: 1rem; }
            .footer-text { font-size: 1.8rem; }
            .btn-info { font-size: 0.9rem; padding: 8px 20px; }
            .invite-box { padding: 12px 15px; }
            .title-box { padding: 5px 20px; }
        }

        @media (min-width: 500px) {
            .invitation-card { max-width: 450px; }
            h1 { font-size: 2.8rem; }
            .invite-text { font-size: 1.4rem; }
            .footer-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        
        <!-- Confeti animado -->
        <div class="confetti-container" id="confettiContainer"></div>

        <!-- Estrellas brillantes -->
        <div class="star-bright" style="top: 8%; left: 6%;">✦</div>
        <div class="star-bright" style="top: 12%; right: 8%; animation-delay: 0.5s;">✦</div>
        <div class="star-bright" style="bottom: 18%; left: 5%; animation-delay: 1s;">✦</div>
        <div class="star-bright" style="bottom: 22%; right: 6%; animation-delay: 0.3s;">✦</div>
        <div class="star-bright" style="top: 50%; left: 3%; animation-delay: 0.8s;">✦</div>
        <div class="star-bright" style="top: 45%; right: 4%; animation-delay: 1.2s;">✦</div>

        <div class="content">
            <!-- Título -->
            <div class="title-box">
                <h1>¡Hijo!</h1>
            </div>

            <!-- Invitación principal -->
            <div class="invite-box">
                <div class="invite-text">
                    Te invito a ver <br>
                    <span class="highlight">Bely y Beto</span><br>
                    junto a mi
                </div>
            </div>

            <!-- Botón para ver información -->
            <button class="btn-info" onclick="toggleInfo()">
                Ver lugar y hora
            </button>

            <!-- Información oculta -->
            <div class="info-hidden" id="infoHidden">
                <div class="info-text">
                    29 de junio del 2026<br>
                    16:30 Hrs<br>
                    Teatro Caupolicán
                </div>
            </div>

            <!-- Footer -->
            <div class="footer-box">
                <div class="footer-text">
                    ¡No Faltes!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para mostrar/ocultar información
        function toggleInfo() {
            const info = document.getElementById('infoHidden');
            info.classList.toggle('show');
        }

        // Generar confeti
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffcc00', '#ff6b00', '#ff0000', '#ff00ff', '#00ccff', '#ffa500', '#ff1493', '#00ff7f'];
            
            for (let i = 0; i < 25; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 6 + 4 + 'px';
                confetti.style.height = Math.random() * 6 + 4 + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(confetti);
            }
        }

        // Limpiar confeti viejo y regenerar cada 5 segundos
        function refreshConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            createConfetti();
        }

        // Iniciar confeti
        createConfetti();
        setInterval(refreshConfetti, 5000);
    </script>

</body>
</html>
